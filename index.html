<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <title>VitalLog Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #1e293b;
            background: linear-gradient(135deg, #334155 0%, #0f172a 100%);
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-neo {
            background: rgba(30, 41, 59, 0.95);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 350px;
            height: 600px;
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 2.5rem;
        }
        .input-inner {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
        }
        #modal {
            background: #0f172a;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            border-radius: 2.5rem;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            font-size: 24px !important;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #btn-instalar {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f59e0b;
            color: black;
            padding: 10px 25px;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <button id="btn-instalar">Instalar App en Pantalla</button>

    <div class="card-neo p-6">
        <div class="flex justify-between items-start mb-6 shrink-0">
            <div>
                <p class="text-blue-300 text-[10px] font-bold tracking-widest uppercase">Android Universal</p>
                <h2 class="text-2xl font-extrabold text-white">Vital<span class="text-slate-400">Log</span></h2>
            </div>
            <button onclick="toggleModal(true)" class="bg-slate-700 p-2 rounded-lg border border-white/10 text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-4 shrink-0">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase block text-center tracking-tighter">Sistólica</label>
                <div class="input-inner p-3">
                    <input id="sys" type="number" pattern="\d*" value="120" class="w-full bg-transparent text-white text-center outline-none font-bold">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase block text-center tracking-tighter">Diastólica</label>
                <div class="input-inner p-3">
                    <input id="dia" type="number" pattern="\d*" value="80" class="w-full bg-transparent text-white text-center outline-none font-bold">
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-2 mb-6 shrink-0">
            <button onclick="registrar()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">GUARDAR</button>
            <button onclick="enviarWhatsApp()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">WHATSAPP</button>
        </div>

        <div class="flex flex-col flex-grow min-h-0">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-3">Logs Recientes</p>
            <div id="h-list" class="overflow-y-auto no-scrollbar space-y-2 flex-grow"></div>
        </div>

        <div id="modal" class="p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white font-bold">Historial</h3>
                <button onclick="toggleModal(false)" class="text-white text-2xl px-2">&times;</button>
            </div>
            <div id="modal-list" class="overflow-y-auto no-scrollbar space-y-2 flex-grow"></div>
            <button onclick="toggleModal(false)" class="mt-4 w-full py-3 bg-slate-700 rounded-xl text-white font-bold text-[10px] uppercase">Regresar</button>
        </div>
    </div>

    <script>
        var registros = [];

        function guardarEnStorage() {
            localStorage.setItem('vital_data', JSON.stringify(registros));
        }

        function cargarDeStorage() {
            var data = localStorage.getItem('vital_data');
            if(data) {
                registros = JSON.parse(data);
                renderizar();
            }
        }

        function registrar() {
            var sysInput = document.getElementById('sys');
            var diaInput = document.getElementById('dia');
            var s = parseInt(sysInput.value);
            var d = parseInt(diaInput.value);
            if (isNaN(s) || isNaN(d)) { alert("Ingrese números válidos"); return; }
            var ahora = new Date();
            var registro = {
                sys: s,
                dia: d,
                fecha: ahora.getDate() + "/" + (ahora.getMonth() + 1),
                hora: ahora.getHours() + ":" + (ahora.getMinutes() < 10 ? '0' : '') + ahora.getMinutes(),
                estado: (s >= 140 || d >= 90) ? 'ALTA' : (s >= 130 || d >= 80) ? 'ELEVADA' : 'ÓPTIMA'
            };
            registros.unshift(registro);
            guardarEnStorage();
            renderizar();
        }

        function renderizar() {
            var containers = [document.getElementById('h-list'), document.getElementById('modal-list')];
            for (var i = 0; i < containers.length; i++) {
                var c = containers[i];
                if(!c) continue;
                c.innerHTML = '';
                for (var j = 0; j < registros.length; j++) {
                    var r = registros[j];
                    var color = r.estado === 'ALTA' ? 'text-red-400' : r.estado === 'ELEVADA' ? 'text-orange-400' : 'text-green-400';
                    var div = document.createElement('div');
                    div.className = 'flex justify-between items-center p-3 bg-white/5 rounded-lg border border-white/5 shrink-0';
                    div.innerHTML = '<div class="flex flex-col"><span class="text-white font-bold">' + r.sys + '/' + r.dia + '</span><span class="text-[8px] font-bold ' + color + '">' + r.estado + '</span></div><div class="text-right"><div class="text-[10px] text-slate-300">' + r.fecha + '</div><div class="text-[8px] text-slate-500">' + r.hora + '</div></div>';
                    c.appendChild(div);
                }
            }
        }

        function toggleModal(show) { document.getElementById('modal').style.display = show ? 'flex' : 'none'; }

        function enviarWhatsApp() {
            if (registros.length === 0) return;
            var r = registros[0];
            var texto = "*VitalLog Report*\nPresión: " + r.sys + "/" + r.dia + "\nEstado: " + r.estado + "\nHora: " + r.hora;
            window.location.href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(texto);
        }

        // Lógica de Instalación PWA
        var deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btn-instalar').style.display = 'block';
        });

        document.getElementById('btn-instalar').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('btn-instalar').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        cargarDeStorage();
    </script>
</body>
</html>
